name: Build Android APK

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: false
        default: 'v1.1.0'
  # Auto-trigger on push of a version tag: git push origin v1.1.0
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build APK via EAS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thronos-wallet-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: thronos-wallet-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK (EAS preview profile)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json > build_result.json
          echo "Build submitted:"
          cat build_result.json
          BUILD_ID=$(cat build_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if isinstance(d,list) else d['id'])" 2>/dev/null || echo "")
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Wait for build and download APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Waiting for build $BUILD_ID to complete..."
          MAX_WAIT=1800  # 30 minutes
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(eas build:view $BUILD_ID --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            echo "[$ELAPSED s] Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              APK_URL=$(eas build:view $BUILD_ID --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('artifacts',{}).get('buildUrl',''))" 2>/dev/null || echo "")
              echo "APK_URL=$APK_URL" >> $GITHUB_ENV
              echo "Build finished! URL: $APK_URL"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          if [ -z "$APK_URL" ]; then
            echo "Timeout or no URL — checking EAS for latest build..."
            APK_URL=$(eas build:list --platform android --limit 1 --json 2>/dev/null | python3 -c "import sys,json; builds=json.load(sys.stdin); print(builds[0].get('artifacts',{}).get('buildUrl','') if builds else '')" 2>/dev/null || echo "")
            echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          fi

      - name: Download APK
        run: |
          if [ -z "$APK_URL" ]; then
            echo "No APK URL found. Build may have failed."
            exit 1
          fi
          curl -L "$APK_URL" -o thronos-wallet.apk
          ls -lh thronos-wallet.apk

      - name: Get release tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          name: "Thronos Wallet ${{ steps.get_tag.outputs.TAG }}"
          draft: false
          prerelease: true
          body: |
            ## Thronos Wallet ${{ steps.get_tag.outputs.TAG }} — Android APK

            **Install instructions:**
            1. Download `thronos-wallet.apk` below
            2. On your Android: Settings → Security → Enable "Unknown Sources" (or "Install unknown apps")
            3. Open the downloaded APK and install

            **What's included:**
            - V1 Wallet — THR canonical address
            - Send / Receive / Swap / Bridge
            - Music, Mining stats, T2E Dashboard
            - Pledge activation flow
            - QR code scanner

            Built automatically via EAS Build.
          files: |
            thronos-wallet-app/thronos-wallet.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
